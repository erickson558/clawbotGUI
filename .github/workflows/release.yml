name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build executable
        shell: pwsh
        run: .\build.ps1

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = python -c "from app_version import APP_VERSION; print(APP_VERSION)"
          "value=$version" >> $env:GITHUB_OUTPUT

      - name: Create tag and release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v${{ steps.version.outputs.value }}"
          $tagExists = git tag --list $tag
          if (-not $tagExists) {
            git tag $tag $env:GITHUB_SHA
            git push origin $tag
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag ".\clawbotGUI.exe" --clobber
          } else {
            gh release create $tag ".\clawbotGUI.exe" --generate-notes --title $tag
          }
