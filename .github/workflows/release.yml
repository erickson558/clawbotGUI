name: release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Build executable
        shell: pwsh
        run: .\build.ps1

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $versionFields = python -c "from app_version import APP_VERSION, APP_VERSION_TAG; print('|'.join((APP_VERSION, APP_VERSION_TAG)))"
          if ($LASTEXITCODE -ne 0 -or -not $versionFields) {
            throw "No se pudo leer la versión desde app_version.py"
          }
          $version, $tag = $versionFields.Trim() -split '\|', 2
          "value=$version" >> $env:GITHUB_OUTPUT
          "tag=$tag" >> $env:GITHUB_OUTPUT
          "asset=clawbotGUI-$tag.exe" >> $env:GITHUB_OUTPUT

      - name: Prepare release asset
        shell: pwsh
        run: |
          Copy-Item ".\clawbotGUI.exe" ".\${{ steps.version.outputs.asset }}" -Force

      - name: Create tag and release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $tagExists = git tag --list $tag
          if (-not $tagExists) {
            git tag $tag $env:GITHUB_SHA
            git push origin $tag
          }

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag ".\${{ steps.version.outputs.asset }}" --clobber
          } else {
            gh release create $tag ".\${{ steps.version.outputs.asset }}" --generate-notes --title $tag
          }
